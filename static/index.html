<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Distributed KV Store</title>
  <style>
    body {
      font-family: Arial;
      margin: 40px;
    }
    input {
      padding: 6px;
      margin: 5px;
      width: 200px;
    }
    button {
      padding: 6px 12px;
      margin: 5px;
    }
    #put-result {
      margin-top: 20px;
      background: #f4f4f4;
      padding: 10px;
    }
    #get-result {
      margin-top: 20px;
      background: #f4f4f4;
      padding: 10px;
    }
    #id-cua-tbody {
      margin-top: 20px;
      background: #f4f4f4;
      padding: 10px;
    }
  </style>
</head>
<body>

<h2>Distributed Key-Value Store</h2>
<H1>Put Dữ Liệu</H1>
<input id="put-key" placeholder="Key">
<input id="value" placeholder="Value">

<br>

<button onclick="put()">PUT</button>
<div id="put-result"></div>
<br>
<H1>Get Dữ Liệu</H1>
<input id="get-key" placeholder="Key">
<br>
<button onclick="get()">GET</button>

<div id="get-result"></div>
<h1>Bảng Dữ Liệu Của Hệ Thống</h1>
<div id="id-cua-tbody"></div>
<br>
<button onclick="layDuLieuHeThong()">GET</button>


<script>
const SERVER = "http://127.0.0.1:8000";
const NODES = [
    "http://127.0.0.1:8000",
    "http://127.0.0.1:8001",
    "http://127.0.0.1:8002",
    "http://127.0.0.1:8003",
    "http://127.0.0.1:8004",
    "http://127.0.0.1:8005",
]
function put() {
  const key = document.getElementById("put-key").value;
  const value = document.getElementById("value").value;

  fetch(`${SERVER}/put?key=${key}&value=${value}`, {
    method: "POST"
  })
  .then(r => r.json())
  .then(data => {
    document.getElementById("put-result").innerText =
      JSON.stringify(data, null, 2);
  });
}

function get() {
  const key = document.getElementById("get-key").value;

  fetch(`${SERVER}/get?key=${key}`)
    .then(r => r.json())
    .then(data => {
      console.log("Dữ liệu thực tế từ Server:", data.response);
      let value = null;
      let source = null;
      if (data.value !== undefined) {
        value = data.value;
        source = data.source;
      }

      document.getElementById("get-result").innerText =
        value !== null
          ? `GET OK\nKey: ${key}\nValue: ${value} \nsource: ${source}`
          : JSON.stringify(data, null, 2);
    });
}
async function layDuLieuHeThong() {
    const promises = NODES.map(async (url) => {
        try {
            // Gọi endpoint all_data của từng node
            const res = await fetch(`${url}/all_data`, { 
                signal: AbortSignal.timeout(1500) 
            });
            const json = await res.json();
            
            // Xử lý dữ liệu: Mỗi cặp Key-Value nằm trong 1 <div> để tự xuống dòng
            let chuoiDuLieu = Object.entries(json.data)
                .map(([key, val]) => `
                    <div style="border-bottom: 1px solid #eee; padding: 5px 0;">
                        <b style="color: #2c3e50;">${key}</b>: <span style="color: #27ae60;">${val}</span>
                    </div>`)
                .join("");

            return `
                <tr>
                    <td style="padding: 10px; font-weight: bold; vertical-align: top;">${url}</td>
                    <td style="padding: 10px;">${chuoiDuLieu || "<span style='color: #999;'><i>Trống</i></span>"}</td>
                </tr>`;
        } catch (error) {
            // Hiển thị trạng thái lỗi nếu server sập hoặc lỗi CORS
            return `
                <tr style="background-color: #fff5f5;">
                    <td style="padding: 10px; color: #e74c3c;">${url}</td>
                    <td style="padding: 10px; color: #e74c3c;">⚠️ Offline (CORS hoặc Server Down)</td>
                </tr>`;
        }
    });

    const rows = await Promise.all(promises);
    document.getElementById("id-cua-tbody").innerHTML = rows.join("");
}
</script>

</body>
</html>
