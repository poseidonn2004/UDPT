<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Distributed KV Store Dashboard</title>
    <link rel="stylesheet" href="static/style.css">
</head>
<body>

    <div class="container">
        <h2>Distributed Key-Value Store</h2>
        
        <section>
            <h3>Put Dữ Liệu</h3>
            <input id="put-key" placeholder="Key">
            <input id="value" placeholder="Value">
            <button onclick="put()">PUT</button>
            <div id="put-result">Chưa có kết quả...</div>
        </section>

        <section style="margin-top: 40px;">
            <h3>Get Dữ Liệu</h3>
            <input id="get-key" placeholder="Key">
            <button onclick="get()">GET</button>
            <div id="get-result">Chưa có kết quả...</div>
        </section>
        <section style="margin-top: 40px;">
            <h3>Delete Dữ Liệu</h3>
            <input id="delete-key" placeholder="Key">
            <button onclick="deleteKey()">DELETE</button>
            <div id="delete-result">Chưa có kết quả...</div>
        </section>
    </div>

    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3>Trạng Thái Toàn Hệ Thống</h3>
            <button onclick="layDuLieuHeThong()" style="background-color: #34a853;">Làm mới dữ liệu</button>
        </div>
        
        <div id="id-cua-tbody"></div>
    </div>

<script>
const SERVER = "http://127.0.0.1:8000";
const NODES = [
    "http://127.0.0.1:8000",
    "http://127.0.0.1:8001",
    "http://127.0.0.1:8002",
    "http://127.0.0.1:8003",
    "http://127.0.0.1:8004",
    "http://127.0.0.1:8005",
];

// Giữ nguyên các hàm put() và get() của bạn
function put() {
  const key = document.getElementById("put-key").value;
  const value = document.getElementById("value").value;
  fetch(`${SERVER}/put?key=${key}&value=${value}`, { method: "POST" })
  .then(r => r.json())
  .then(data => {
    document.getElementById("put-result").innerText = "Đang cập nhật hệ thống...";
    
    // Đợi một chút rồi mới load lại để đảm bảo dữ liệu đã được ghi phân tán xong
    setTimeout(() => {
        layDuLieuHeThong();
        document.getElementById("put-result").innerText = "Thành công & Đã cập nhật!";
    }, 500);
  })
  .catch(err => {
    console.error("Lỗi khi PUT:", err);
    alert("Không thể kết nối tới Server! Vui lòng kiểm tra lại mạng.");
});
}

function get() {
  const key = document.getElementById("get-key").value;
  fetch(`${SERVER}/get?key=${key}`)
    .then(r => r.json())
    .then(data => {
      let val = data.value !== undefined ? data.value : "Không tìm thấy";
      let src = data.source || "N/A";
      document.getElementById("get-result").innerHTML = `<b>Value:</b> ${val} | <b>Source:</b> ${src}`;
    });
}
function deleteKey() {
  const key = document.getElementById("delete-key").value;

  fetch(`${SERVER}/delete?key=${key}`, { method: "DELETE" })
    .then(r => r.json())
    .then(data => {
      document.getElementById("delete-result").innerText = "Đang cập nhật hệ thống...";

      setTimeout(() => {
        layDuLieuHeThong();
        document.getElementById("delete-result").innerText = "Đã xóa key!";
      }, 500);
    })
    .catch(err => {
      console.error("Lỗi khi DELETE:", err);
      alert("Không thể kết nối tới Server!");
    });
}

// HÀM LẤY DỮ LIỆU ĐÃ ĐƯỢC LÀM ĐẸP (RENDER DẠNG CARD)
async function layDuLieuHeThong() {
    const container = document.getElementById("id-cua-tbody");
    
    const promises = NODES.map(async (url) => {
        try {
            const res = await fetch(`${url}/all_data`, { signal: AbortSignal.timeout(1500) });
            const json = await res.json();
            
            let htmlItems = Object.entries(json.data).map(([key, val]) => `
                <div class="data-item">
                    <span class="data-key">${key}</span>
                    <span class="data-value">${val}</span>
                </div>
            `).join("");

            if (!htmlItems) htmlItems = "<p style='color:#999; font-style:italic;'>Node trống</p>";

            return `
                <div class="node-card">
                    <div class="node-header">${url}</div>
                    <div class="node-body">${htmlItems}</div>
                </div>`;
        } catch (error) {
            return `
                <div class="node-card">
                    <div class="node-header" style="background:#fce8e6; color:#d93025;">${url}</div>
                    <div class="status-offline">⚠️ Offline / CORS Error</div>
                </div>`;
        }
    });

    const cards = await Promise.all(promises);
    container.innerHTML = cards.join("");
}

// Tự động load dữ liệu khi mở trang
window.onload = layDuLieuHeThong;
</script>

</body>
</html>
